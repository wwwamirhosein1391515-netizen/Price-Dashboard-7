<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>داشبورد قیمت</title>
<style>
  @font-face{
    font-family: 'VazirMatn';
    src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazir-matn-font@v27.2.2/dist/Vazir-Matn-Regular.woff2') format('woff2');
    font-weight: 400; font-display: swap;
  }
  @font-face{
    font-family: 'VazirMatn';
    src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazir-matn-font@v27.2.2/dist/Vazir-Matn-Medium.woff2') format('woff2');
    font-weight: 500; font-display: swap;
  }
  @font-face{
    font-family: 'VazirMatn';
    src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazir-matn-font@v27.2.2/dist/Vazir-Matn-Bold.woff2') format('woff2');
    font-weight: 700; font-display: swap;
  }
  @font-face{
    font-family: 'VazirMatn';
    src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazir-matn-font@v27.2.2/dist/Vazir-Matn-ExtraBold.woff2') format('woff2');
    font-weight: 800; font-display: swap;
  }
  :root{
    --bar-bg: #ffffff;
    --icon-color: #9a9aa1;
    --text-color: #8b8b92;
    --page-bg: #ededee;
    --up-color: #1faa59;
    --down-color: #e0473f;
    --card-bg: #ffffff;
    --title-color: #1c1c1e;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  button{ outline: none; -webkit-tap-highlight-color: transparent; }
  button:focus, button:focus-visible{ outline: none; }
  html, body{
    margin: 0; padding: 0; width: 100%; min-height: 100%;
    background: var(--page-bg);
    font-family: 'VazirMatn', -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, sans-serif;
  }
  body{ position: relative; }

  /* ===== Top bar ===== */
  .top-wrapper{
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
    padding: max(16px, env(safe-area-inset-top, 16px)) 20px 12px;
    background: linear-gradient(to bottom, rgba(237,237,238,1) 70%, rgba(237,237,238,0));
    pointer-events: none;
  }
  .dashboard-title{
    font-size: 17px; font-weight: 700; color: var(--title-color);
    letter-spacing: 0.01em;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    opacity: 0.85;
  }

  /* ===== Bottom search bar ===== */
  .bottom-wrapper{
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    padding: 12px 20px max(20px, env(safe-area-inset-bottom, 20px));
    background: linear-gradient(to top, rgba(237,237,238,1) 60%, rgba(237,237,238,0));
    transition: transform 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.35s ease;
    transform: translateY(0); opacity: 1;
  }
  .bottom-wrapper.hidden-bar{ transform: translateY(100%); opacity: 0; pointer-events: none; }
  .search-bar{
    width: 70%; min-width: 200px; max-width: 380px; height: 50px;
    background: var(--bar-bg); border-radius: 25px;
    display: flex; align-items: center; gap: 10px; padding: 0 18px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 20px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.06);
    transition: box-shadow 0.25s ease, transform 0.15s cubic-bezier(0.22,1,0.36,1);
    cursor: text; will-change: transform;
  }
  .search-bar:active{ transform: scale(0.94); }
  .search-bar.focused{
    transform: scale(1);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 10px 24px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.08);
  }
  .search-bar.pressing{ transform: scale(0.94) !important; }
  .search-icon{ flex: 0 0 auto; width: 19px; height: 19px; display: flex; align-items: center; justify-content: center; color: var(--icon-color); }
  .search-icon svg{ width: 100%; height: 100%; display: block; }
  .search-input{
    flex: 1 1 auto; border: none; outline: none; background: transparent;
    font-size: 16px; font-weight: 600; color: #3c3c43; caret-color: #3c3c43;
    width: 100%; height: 100%;
    font-family: 'VazirMatn', -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, sans-serif;
  }
  [dir="rtl"] .search-input{ direction: rtl; text-align: right; }
  [dir="ltr"] .search-input{ direction: ltr; text-align: left; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .search-input::placeholder{ color: var(--text-color); font-weight: 600; opacity: 1; }

  @media (min-width: 768px){
    .search-bar{ height: 52px; border-radius: 26px; padding: 0 22px; max-width: 420px; }
    .search-input{ font-size: 17px; }
    .search-icon{ width: 21px; height: 21px; }
  }
  @media (max-width: 380px){
    .search-bar{ height: 46px; padding: 0 16px; gap: 8px; width: 80%; }
    .search-input{ font-size: 15px; }
  }

  /* ===== Page ===== */
  .page{
    padding-top: 80px; padding-bottom: 100px;
    max-width: 720px; margin: 0 auto;
    padding-left: 16px; padding-right: 16px;
  }
  @media (min-width: 1200px){
    .page{ padding-top: 90px; }
    .top-wrapper{ padding-top: 28px; }
  }

  .section-label{
    font-size: 13px; font-weight: 700; color: var(--text-color);
    text-transform: uppercase; letter-spacing: 0.04em;
    margin: 18px 4px 10px;
  }
  [dir="ltr"] .section-label{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.06em;
  }

  .grid{
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  }
  @media (min-width: 560px){ .grid{ grid-template-columns: repeat(3, 1fr); } }

  /* ===== CARD ===== */
  .card{
    background: var(--card-bg);
    border-radius: 18px;
    padding: 14px 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 4px 14px rgba(0,0,0,0.05);
    transition: opacity 0.25s ease, transform 0.25s ease;
    display: flex; flex-direction: column; gap: 6px;
    min-height: 84px;
    position: relative;
    overflow: hidden;
  }
  .card.hidden{ display: none; }
  .card.no-price{ display: none; }

  /* ===== پس‌زمینه پرچم / رنگ ===== */
  .card-bg{
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    border-radius: 18px;
    overflow: hidden;
  }
  /* پرچم واقعی با object-fit */
  .card-bg-flag-img{
    position: absolute;
    inset: -20px;
    width: calc(100% + 40px);
    height: calc(100% + 40px);
    object-fit: cover;
    object-position: center;
    filter: blur(14px) saturate(2.4) brightness(0.95) contrast(1.15);
    opacity: 1;
    display: block;
  }
  /* div fallback برای CSS gradient */
  .card-bg-flag{
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
  }
  /* لایه solid color برای طلا/نقره/crypto */
  .card-bg-solid{
    position: absolute;
    inset: 0;
    opacity: 0.38;
  }
  /* overlay سفید برای خوانایی متن */
  .card-bg-overlay{
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.26);
    backdrop-filter: blur(2px);
  }

  /* محتوای کارت بالای bg */
  .card-top, .card-price, .card-unit{ position: relative; z-index: 1; }

  .card-top{
    display: flex; align-items: center; justify-content: space-between; gap: 6px;
  }
  .card-name{
    font-size: 13px; font-weight: 700; color: var(--title-color); line-height: 1.3;
  }
  [dir="ltr"] .card-name{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

  .card-badge{
    font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px;
    white-space: nowrap; flex-shrink: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .badge-up{ color: var(--up-color); background: rgba(31,170,89,0.12); }
  .badge-down{ color: var(--down-color); background: rgba(224,71,63,0.12); }
  .badge-flat{ color: var(--text-color); background: rgba(138,138,142,0.10); }

  .card-price{
    font-size: 18px; font-weight: 800; color: var(--title-color);
    letter-spacing: -0.01em; direction: ltr; text-align: right; unicode-bidi: plaintext;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  [dir="ltr"] .card-price{ text-align: left; }

  .card-unit{
    font-size: 11px; color: var(--text-color); font-weight: 600;
  }
  [dir="ltr"] .card-unit{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

  .empty-state{ text-align: center; color: var(--text-color); font-size: 14px; font-weight: 600; padding: 40px 10px; }

  .status-bar{ text-align: center; font-size: 12px; color: var(--text-color); font-weight: 600; margin: 4px 0; }
  [dir="ltr"] .status-bar{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .status-dot{
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: #cfcfd2; margin-left: 6px; transition: background 0.3s ease;
  }
  .status-dot.live{
    background: var(--up-color);
    box-shadow: 0 0 0 0 rgba(31,170,89,0.5);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse{
    0%{ box-shadow: 0 0 0 0 rgba(31,170,89,0.4); }
    70%{ box-shadow: 0 0 0 6px rgba(31,170,89,0); }
    100%{ box-shadow: 0 0 0 0 rgba(31,170,89,0); }
  }

  /* ===== Overlay screens ===== */
  .overlay-screen{
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--page-bg);
    transition: opacity 0.45s cubic-bezier(0.4,0,0.2,1), transform 0.45s cubic-bezier(0.4,0,0.2,1);
  }
  .overlay-screen.hidden-overlay{ opacity: 0; pointer-events: none; transform: scale(1.04); }

  #langScreen{ gap: 36px; }
  .lang-icon{ font-size: 38px; line-height: 1; opacity: 0.7; }
  .lang-headline{ font-size: 15px; font-weight: 600; color: var(--text-color); letter-spacing: 0.02em; text-align: center; }
  .lang-buttons{ display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 280px; padding: 0 24px; }
  .lang-btn{
    width: 100%; height: 56px; border: none; border-radius: 18px; font-size: 17px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--card-bg); color: var(--title-color);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 6px 18px rgba(0,0,0,0.08);
    transition: transform 0.1s cubic-bezier(0.4,0,0.6,1), box-shadow 0.1s ease;
    will-change: transform;
    font-family: 'VazirMatn', -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .lang-btn:active{ transform: scale(0.95); }
  .lang-btn-flag{ font-size: 22px; line-height: 1; }

  #introScreen{ gap: 0; }
  .intro-content{
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.55s cubic-bezier(0.4,0,0.2,1), transform 0.55s cubic-bezier(0.34,1.2,0.64,1);
  }
  .intro-content.visible{ opacity: 1; transform: translateY(0); }
  .intro-logo{
    width: 64px; height: 64px; border-radius: 20px; background: var(--title-color);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 28px rgba(0,0,0,0.13); margin-bottom: 8px;
  }
  .intro-logo svg{ width: 34px; height: 34px; color: #fff; }
  .intro-welcome{ font-size: 13px; font-weight: 600; color: var(--text-color); letter-spacing: 0.06em; text-transform: uppercase; }
  .intro-title{
    font-size: 26px; font-weight: 800; color: var(--title-color);
    letter-spacing: -0.01em; text-align: center; line-height: 1.2;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .intro-title.fa{ font-family: 'VazirMatn', Tahoma, sans-serif; font-size: 24px; }
</style>
</head>
<body>

  <div class="overlay-screen" id="langScreen">
    <div class="lang-icon">🌐</div>
    <div class="lang-headline">Choose your language / زبان خود را انتخاب کنید</div>
    <div class="lang-buttons">
      <button class="lang-btn" id="btnFa"><span class="lang-btn-flag">🇮🇷</span>فارسی</button>
      <button class="lang-btn" id="btnEn"><span class="lang-btn-flag">🇺🇸</span>English</button>
    </div>
  </div>

  <div class="overlay-screen hidden-overlay" id="introScreen">
    <div class="intro-content" id="introContent">
      <div class="intro-logo">
        <svg viewBox="0 0 24 24" fill="none">
          <polyline points="2 14 7 9 11 13 16 7 22 12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="2" y1="20" x2="22" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
        </svg>
      </div>
      <div class="intro-welcome" id="introWelcome">Welcome</div>
      <div class="intro-title" id="introTitle">Price Dashboard</div>
    </div>
  </div>

  <div id="mainApp">
    <div class="top-wrapper">
      <span class="dashboard-title" id="dashboardTitle">Price Dashboard</span>
    </div>
    <div class="page">
      <div class="status-bar" id="statusBar">--<span class="status-dot" id="statusDot"></span></div>
      <div id="priceGrid"></div>
      <div class="empty-state" id="emptyState" style="display:none;"></div>
    </div>
    <div class="bottom-wrapper" id="bottomWrapper">
      <div class="search-bar" id="searchBar">
        <div class="search-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2.2"/>
            <line x1="16.4" y1="16.4" x2="21" y2="21" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </div>
        <input type="text" class="search-input" id="searchInput" placeholder="جست‌وجو"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      </div>
    </div>
  </div>

  var searchBar    = document.getElementById('searchBar');
  var bottomWrapper= document.getElementById('bottomWrapper');
  var statusBar    = document.getElementById('statusBar');
  var grid         = document.getElementById('priceGrid');

  var savedLang    = localStorage.getItem('pd_lang');
  var currentLang  = savedLang || 'fa';
  var firstFetchDone = false;
  var cardEls = {};
  var currentGrid = null;

  /* ---------- build card background HTML ---------- */
  function buildCardBgHtml(id) {
    var bg = CARD_BG[id];
    if (!bg) return '';
    if (bg.type === 'flag' && bg.code) {
      var url = 'https://flagcdn.com/w160/' + bg.code + '.png';
      var fallbackCss = bg.css ? bg.css.replace(/"/g,'&quot;') : '';
      var onerrorHandler = fallbackCss
        ? 'this.style.display=\'none\';var d=this.nextElementSibling;d.style.background=\''+fallbackCss+'\';'
        : 'this.style.display=\'none\';';
      return '<div class="card-bg" aria-hidden="true">' +
               '<img class="card-bg-flag-img" src="' + url + '" alt=""' +
                 ' onerror="' + onerrorHandler + '">' +
               '<div class="card-bg-flag"></div>' +
               '<div class="card-bg-overlay"></div>' +
             '</div>';
    }
    if (bg.type === 'flag' && bg.css) {
      return '<div class="card-bg" aria-hidden="true">' +
               '<div class="card-bg-solid" style="background:' + bg.css + '"></div>' +
               '<div class="card-bg-overlay"></div>' +
             '</div>';
    }
    if (bg.type === 'solid') {
      return '<div class="card-bg" aria-hidden="true">' +
               '<div class="card-bg-solid" style="background:' + bg.color + '"></div>' +
               '<div class="card-bg-overlay"></div>' +
             '</div>';
    }
    return '';
  }

  /* ---------- build cards ---------- */
  WATCHLIST.forEach(function(item){
    if (item.section) {
      var sectionKey = item.id.replace('_sec_','');
      var label = document.createElement('div');
      label.className = 'section-label';
      label.dataset.sectionId = item.id;
      var initL = localStorage.getItem('pd_lang') || 'fa';
      label.textContent = TRANSLATIONS[initL]['sec_'+sectionKey] || sectionKey;
      grid.appendChild(label);
      currentGrid = document.createElement('div');
      currentGrid.className = 'grid';
      currentGrid.dataset.sectionGrid = item.id;
      grid.appendChild(currentGrid);
      return;
    }

    var initL2 = localStorage.getItem('pd_lang') || 'fa';
    var t0 = TRANSLATIONS[initL2];
    var labelText = t0.items[item.id] || item.id;
    var unitType  = item.unit;
    var unitText  = unitType==='gram' ? t0.perGram : unitType==='unit' ? t0.perUnit : t0.toman;

    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = item.id;
    card.dataset.label = labelText.toLowerCase();
    card.dataset.unitType = unitType;
    card.innerHTML =
      buildCardBgHtml(item.id) +
      '<div class="card-top">' +
        '<div class="card-name" data-role="name">' + labelText + '</div>' +
        '<div class="card-badge badge-flat" data-role="badge">--</div>' +
      '</div>' +
      '<div class="card-price" data-role="price">—</div>' +
      '<div class="card-unit" data-role="unit">' + unitText + '</div>';
    (currentGrid || grid).appendChild(card);
    cardEls[item.id] = card;
  });

  /* ---------- applyLang ---------- */
  function applyLang(lang) {
    var t = TRANSLATIONS[lang];
    var isRtl = lang === 'fa';
    document.documentElement.setAttribute('dir', isRtl ? 'rtl' : 'ltr');
    document.documentElement.setAttribute('lang', lang);
    document.title = t.pageTitle;
    if (dashboardTitle) dashboardTitle.textContent = t.dashTitle;
    if (emptyState)     emptyState.textContent     = t.noResult;
    if (searchInput)    searchInput.placeholder    = t.searchPlaceholder;

    document.querySelectorAll('[data-section-id]').forEach(function(el){
      var sid = el.dataset.sectionId;
      var key = 'sec_' + sid.replace('_sec_','');
      if (t[key]) el.textContent = t[key];
    });

    Object.keys(cardEls).forEach(function(id){
      var card = cardEls[id];
      var nameEl = card.querySelector('[data-role="name"]');
      var unitEl = card.querySelector('[data-role="unit"]');
      if (nameEl && t.items[id]) nameEl.textContent = t.items[id];
      if (unitEl) {
        var ut = card.dataset.unitType;
        unitEl.textContent = ut==='gram' ? t.perGram : ut==='unit' ? t.perUnit : t.toman;
      }
      if (t.items[id]) card.dataset.label = t.items[id].toLowerCase();
    });

    if (!firstFetchDone) {
      statusBar.innerHTML = t.connecting + ' <span class="status-dot"></span>';
    }
  }

  /* ---------- intro ---------- */
  function showIntro(lang, callback){
    var t = TRANSLATIONS[lang];
    introWelcome.textContent = t.introWelcome;
    introTitle.textContent   = t.introTitle;
    lang==='fa' ? introTitle.classList.add('fa') : introTitle.classList.remove('fa');
    introScreen.classList.remove('hidden-overlay');
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){ introContent.classList.add('visible'); });
    });
    setTimeout(function(){
      introScreen.classList.add('hidden-overlay');
      mainApp.style.display = '';
      setTimeout(function(){
        introScreen.style.display = 'none';
        applyLang(lang);
        if (callback) callback();
      }, 480);
    }, 1600);
  }

  function pickLang(lang){
    currentLang = lang;
    localStorage.setItem('pd_lang', lang);
    langScreen.classList.add('hidden-overlay');
    setTimeout(function(){
      langScreen.style.display = 'none';
      showIntro(lang, null);
    }, 450);
  }

  document.getElementById('btnFa').addEventListener('click', function(){ pickLang('fa'); });
  document.getElementById('btnEn').addEventListener('click', function(){ pickLang('en'); });

  if (savedLang) {
    currentLang = savedLang;
    langScreen.style.display = 'none';
    showIntro(savedLang, null);
  } else {
    mainApp.style.display = 'none';
  }

  /* ==================== API ==================== */
  var API_KEY = "freeOVcUxPkOdrCzqfhPWBceNLS9Psq3";
  var NAVASAN_URL = "https://api.navasan.tech/latest/?api_key=" + API_KEY;
  var CORS_PROXIES = [
    function(u){ return "https://api.allorigins.win/raw?url=" + encodeURIComponent(u); },
    function(u){ return "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(u); },
    function(u){ return "https://corsproxy.io/?url=" + encodeURIComponent(u); }
  ];
  var REFRESH_INTERVAL_MS = 10 * 60 * 1000;
  var PROXY_TIMEOUT_MS    = 8000;

  function formatNumber(n){
    if (n===null||n===undefined||n===''||isNaN(n)) return null;
    return Number(n).toLocaleString('en-US');
  }

  function getApiItem(data, watchItem){
    for (var i=0;i<watchItem.keys.length;i++){
      var k = watchItem.keys[i];
      if (data && Object.prototype.hasOwnProperty.call(data,k) && data[k]) return data[k];
    }
    return null;
  }

  function updateCard(watchItem, apiItem){
    var card = cardEls[watchItem.id];
    if (!card) return;
    var priceEl = card.querySelector('[data-role="price"]');
    var badgeEl = card.querySelector('[data-role="badge"]');
    var rawPrice = apiItem ? apiItem.value : null;
    var formattedPrice = formatNumber(rawPrice);
    var changePercent = apiItem ? (apiItem.change_pct!==undefined ? apiItem.change_pct : apiItem.change) : null;

    if (!formattedPrice){ card.classList.add('no-price'); return; }
    card.classList.remove('no-price');
    priceEl.textContent = formattedPrice;

    if (changePercent===null||changePercent===undefined||changePercent===''||isNaN(changePercent)){
      badgeEl.className='card-badge badge-flat'; badgeEl.textContent='--';
    } else {
      var cp = Number(changePercent);
      if (cp>0){ badgeEl.className='card-badge badge-up'; badgeEl.textContent='+'+cp.toFixed(2)+'%'; }
      else if (cp<0){ badgeEl.className='card-badge badge-down'; badgeEl.textContent=cp.toFixed(2)+'%'; }
      else { badgeEl.className='card-badge badge-flat'; badgeEl.textContent='0.00%'; }
    }
  }

  function hideEmptySections(){
    document.querySelectorAll('[data-section-grid]').forEach(function(sGrid){
      var sid = sGrid.dataset.sectionGrid;
      var hasVisible = sGrid.querySelector('.card:not(.hidden):not(.no-price)');
      var labelEl = document.querySelector('[data-section-id="'+sid+'"]');
      if (labelEl) labelEl.style.display = hasVisible ? '' : 'none';
      sGrid.style.display = hasVisible ? '' : 'none';
    });
  }

  async function fetchWithTimeout(url, ms){
    var controller = new AbortController();
    var timer = setTimeout(function(){ controller.abort(); }, ms);
    try {
      var res = await fetch(url, {cache:'no-store', signal:controller.signal});
      return res;
    } finally { clearTimeout(timer); }
  }

  async function fetchPrices(){
    var errors = [];
    for (var i=0;i<CORS_PROXIES.length;i++){
      var proxyUrl = CORS_PROXIES[i](NAVASAN_URL);
      try {
        var res = await fetchWithTimeout(proxyUrl, PROXY_TIMEOUT_MS);
        if (!res.ok) throw new Error('HTTP '+res.status);
        var data = await res.json();
        if (data && data.error) throw new Error('API error: '+data.error);
        WATCHLIST.forEach(function(watchItem){
          if (watchItem.section) return;
          updateCard(watchItem, getApiItem(data, watchItem));
        });
        firstFetchDone = true;
        hideEmptySections();
        var t = TRANSLATIONS[currentLang];
        var timeStr = new Date().toLocaleTimeString(currentLang==='fa'?'fa-IR':'en-US');
        statusBar.innerHTML = t.updated + timeStr + ' <span class="status-dot live"></span>';
        return;
      } catch(err){
        errors.push(err&&err.name==='AbortError'?'timeout':err.message);
        console.error('Proxy #'+(i+1)+' failed:',err);
      }
    }
    var t = TRANSLATIONS[currentLang];
    statusBar.innerHTML = t.error + ' <span class="status-dot"></span>';
    console.error('All proxies failed:', errors.join(' | '));
  }

  fetchPrices();
  setInterval(fetchPrices, REFRESH_INTERVAL_MS);

  /* ==================== Search ==================== */
  searchInput.addEventListener('input', function(){
    var query = searchInput.value.trim().toLowerCase();
    var visibleCount = 0;
    Object.keys(cardEls).forEach(function(id){
      var card = cardEls[id];
      if (card.classList.contains('no-price')) return;
      var matches = query==='' || card.dataset.label.indexOf(query)!==-1;
      card.classList.toggle('hidden', !matches);
      if (matches) visibleCount++;
    });
    hideEmptySections();
    emptyState.textContent = TRANSLATIONS[currentLang].noResult;
    emptyState.style.display = visibleCount===0 ? 'block' : 'none';
  });

  function focusSearch(){
    searchInput.focus();
    searchBar.classList.add('focused');
  }

  searchBar.addEventListener('click', function(){ focusSearch(); });
  searchInput.addEventListener('focus', function(){ searchBar.classList.add('focused'); });
  searchInput.addEventListener('blur', function(){ searchBar.classList.remove('focused'); });

  // موبایل: انیمیشن press + باز کردن کیبورد
  searchBar.addEventListener('touchstart', function(){
    searchBar.classList.add('pressing');
  }, {passive:true});

  searchBar.addEventListener('touchend', function(e){
    searchBar.classList.remove('pressing');
    // setTimeout صفر ضروری است تا پس از پایان چرخه touch، keyboard باز شود
    setTimeout(function(){ focusSearch(); }, 0);
  }, {passive:true});

  searchBar.addEventListener('mousedown', function(){ searchBar.classList.add('pressing'); });
  searchBar.addEventListener('mouseup', function(){ searchBar.classList.remove('pressing'); });

  /* ==================== Scroll hide/show ==================== */
  var lastScrollY = window.scrollY;
  var scrollDir = 'up';
  var ticking = false;
  window.addEventListener('scroll', function(){
    if (!ticking){
      window.requestAnimationFrame(function(){
        var currentY = window.scrollY;
        var delta = currentY - lastScrollY;
        if (currentY<=10){ scrollDir='up'; bottomWrapper.classList.remove('hidden-bar'); }
        else if (delta>4){
          if (scrollDir!=='down'){
            scrollDir='down';
            if (document.activeElement===searchInput) searchInput.blur();
            bottomWrapper.classList.add('hidden-bar');
          }
        } else if (delta<-4){
          if (scrollDir!=='up'){ scrollDir='up'; bottomWrapper.classList.remove('hidden-bar'); }
        }
        lastScrollY = currentY;
        ticking = false;
      });
      ticking = true;
    }
  }, {passive:true});

})();
</script>
</body>
</html>
